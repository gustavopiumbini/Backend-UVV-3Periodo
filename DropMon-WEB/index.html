<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>tsey. | Admin DropMon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #111; color: #fff; padding: 40px; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 2.5rem; letter-spacing: 2px; text-transform: uppercase; }
        
        .btn-carregar { 
            display: block; margin: 0 auto 30px auto; padding: 15px 30px;
            background-color: #fff; color: #000; font-weight: bold; font-size: 1.2rem;
            border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-carregar:hover { background-color: #555; color: #fff; transform: scale(1.05); }
        
        #vitrine { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        
        .card {
            background-color: #222; border: 1px solid #333; border-radius: 8px;
            padding: 20px; width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .card h3 { font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .card p { margin-bottom: 8px; font-size: 0.9rem; color: #bbb; }
        .tag-exclusivo { 
            display: inline-block; background-color: #fff; color: #000; 
            padding: 3px 8px; font-size: 0.7rem; font-weight: bold; margin-top: 10px; 
        }

        /* Estilo para os inputs do formulário */
        .input-form {
            width: 100%; padding: 10px; margin-bottom: 15px; 
            background-color: #111; color: #fff; border: 1px solid #555; border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <h1>tsey <span>DropMon</span></h1>
    </header>

    <button class="btn-carregar" onclick="carregarDados()">Carregar Dados Atuais</button>

    <div class="card" style="margin: 0 auto 40px auto; width: 400px; background-color: #333;">
        <h3 style="color: #fff; text-align: center;">Cadastrar Novo Drop</h3>
        
        <input type="text" id="inputNome" class="input-form" placeholder="Nome da Peça (ex: Boné tsey)">
        <input type="text" id="inputCategoria" class="input-form" placeholder="Categoria (ex: Acessórios)">
        <input type="text" id="inputPreco" class="input-form" placeholder="Preço (ex: 149,90)">
        <input type="number" id="inputEstoque" class="input-form" placeholder="Quantidade em Estoque">
        
        <label style="color: #fff; display: block; margin-bottom: 15px;">
            <input type="checkbox" id="checkExclusivo"> É Drop Exclusivo?
        </label>
        
        <button onclick="enviarNovoProduto()" style="width: 100%; padding: 12px; background-color: #fff; color: #000; font-weight: bold; border: none; cursor: pointer;">
            SALVAR NO BANCO DE DADOS
        </button>
    </div>

    <div id="vitrine"></div>

    <script>
        // FUNÇÃO 1: Busca os dados na API
        function carregarDados() {
            const urlDaSuaApi = 'http://localhost:5126/api/produtos';

            fetch(urlDaSuaApi)
                .then(resposta => resposta.json())
                .then(listaDeProdutos => {
                    const vitrine = document.getElementById('vitrine');
                    vitrine.innerHTML = ''; 

                    listaDeProdutos.forEach(peca => {
                        vitrine.innerHTML += `
                            <div class="card">
                                <h3>${peca.nome}</h3>
                                <p><strong>Categoria:</strong> ${peca.categoria}</p>
                                <p><strong>Preço:</strong> R$ ${peca.preco.toFixed(2)}</p>
                                <p><strong>Estoque:</strong> ${peca.quantidadeEstoque} un.</p>
                                ${peca.isExclusivoDrop ? '<span class="tag-exclusivo">DROP EXCLUSIVO</span>' : ''}
                            </div>
                        `;
                    });
                })
                .catch(erro => console.error("Erro na comunicação com a API:", erro));
        }

        // FUNÇÃO 2: Envia os dados do formulário para a API
        function enviarNovoProduto() {
            // Pegando os valores
            const nomeDigitado = document.getElementById('inputNome').value;
            const categoriaDigitada = document.getElementById('inputCategoria').value;
            const estoqueDigitado = parseInt(document.getElementById('inputEstoque').value);
            const exclusivoDigitado = document.getElementById('checkExclusivo').checked;
            
            // Tratamento ninja para o preço (troca vírgula por ponto)
            const precoTexto = document.getElementById('inputPreco').value.replace(',', '.');
            const precoDigitado = parseFloat(precoTexto);

            // Montando o pacote JSON exatamente como o C# espera
            const novoDrop = {
                nome: nomeDigitado,
                categoria: categoriaDigitada,
                preco: precoDigitado,
                quantidadeEstoque: estoqueDigitado,
                isExclusivoDrop: exclusivoDigitado
            };

            // URL da API C#
            const urlDaSuaApi = 'http://localhost:5126/api/produtos';

            // Enviando (POST)
            fetch(urlDaSuaApi, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(novoDrop)
            })
            .then(resposta => {
                if (resposta.ok) {
                    alert("Sucesso! Peça cadastrada no banco de dados da tsey.");
                    // Limpa os campos do formulário para o próximo cadastro
                    document.getElementById('inputNome').value = '';
                    document.getElementById('inputCategoria').value = '';
                    document.getElementById('inputPreco').value = '';
                    document.getElementById('inputEstoque').value = '';
                    document.getElementById('checkExclusivo').checked = false;
                    
                    // Recarrega a vitrine automaticamente
                    carregarDados(); 
                } else {
                    alert("Ops! O servidor recusou o pacote. O C# está rodando?");
                }
            })
            .catch(erro => console.error("Erro ao enviar:", erro));
        }
    </script>
</body>
</html>
